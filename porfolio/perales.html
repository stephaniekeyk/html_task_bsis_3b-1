<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, Helvetica, sans-serif;
    }
    body {
        background-image: url("https://images.pexels.com/photos/1714208/pexels-photo-1714208.jpeg");
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        height: 100vh;
        color: white;
    }
    header {
        background: rgba(0, 0, 0, 0.6);
        padding: 15px 0;
    }
    nav ul {
        display: flex;
        justify-content: center;
        gap: 40px;
        list-style: none;
    }
    nav ul li {
        font-size: 18px;
        cursor: pointer;
        padding: 5px 10px;
        transition: 0.3s;
    }
    nav ul li:hover {
        color: #00e5ff;
        border-bottom: 2px solid #00e5ff;
    }
    body h1 {
        text-align: center;
        margin-top: 120px;
        font-size: 48px;
        text-shadow: 2px 2px 5px black;
    }
    body p {
        max-width: 700px;
        margin: 20px auto;
        text-align: center;
        font-size: 18px;
        line-height: 1.6;
        background: rgba(0, 0, 0, 0.5);
        padding: 20px;
        border-radius: 10px;
    }
    footer {
        position: fixed;
        bottom: 0;
        width: 100%;
        text-align: center;
        background: rgba(0, 0, 0, 0.7);
        padding: 10px;
        font-size: 14px;
    }
</style>
<header>
